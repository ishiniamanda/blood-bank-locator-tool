<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* This removes the white gaps and grey space */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
        }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #e0e0e0; /* Match the grey if tiles are still loading */
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Initializing map centered on Sri Lanka
        var map = L.map('map').setView([6.9271, 79.8612], 8); 
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var currentLayerGroup = L.layerGroup().addTo(map);

        function drawRoute(lat1, lon1, lat2, lon2) {
            // Clear previous routes/markers so it doesn't get messy
            currentLayerGroup.clearLayers();

            var latlngs = [[lat1, lon1], [lat2, lon2]];
            
            // Draw the line (The Route)
            var polyline = L.polyline(latlngs, {
                color: 'red', 
                weight: 5, 
                opacity: 0.7,
                dashArray: '10, 10' // Makes it look like a path
            }).addTo(currentLayerGroup);
            
            // Add a marker for the Start (Hospital/Center)
            L.marker([lat1, lon1]).addTo(currentLayerGroup)
                .bindPopup("Your Location (Hospital)")
                .openPopup();

            // Add a marker for the Destination (Donor)
            L.marker([lat2, lon2]).addTo(currentLayerGroup)
                .bindPopup("Emergency Donor Found")
                .openPopup();

            // Auto-zoom to show the whole line
            map.fitBounds(polyline.getBounds(), {padding: [50, 50]});
        }
    </script>
</body>
</html>
